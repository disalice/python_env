name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # uv のセットアップ（キャッシュも自動有効化）
      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: "latest"

      # Pythonのインストール（pyproject.tomlの記述から自動判定）
      - name: "Set up Python"
        run: uv python install

      # 依存関係のインストール（テストに必要なdevグループも含む）
      - name: Install dependencies
        run: uv sync --all-groups

      # RuffによるLint/Formatチェック
      - name: Run Linters (Ruff)
        run: |
          uv run ruff check .
          uv run ruff format --check .

      # pytestによるテスト実行
      - name: Run Tests (pytest)
        run: uv run pytest